# ═══════════════════════════════════════════════════════════════════════════════
#                    CoinTrack - Production Configuration
# ═══════════════════════════════════════════════════════════════════════════════
# This profile is activated in production with spring.profiles.active=prod
# All secrets MUST be provided via environment variables - NEVER commit secrets!

spring.application.name=coinTrack

# ─────────────────────────────────────────────────────────────────────────────
# Logging Configuration (Production = Less Verbose, Structured)
# ─────────────────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.urva.myfinance.coinTrack=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# Include request IDs for production debugging
logging.pattern.console=%d{ISO8601} [%X{requestId}] %-5level %logger{36} - %msg%n

# ─────────────────────────────────────────────────────────────────────────────
# DevTools (DISABLED in production)
# ─────────────────────────────────────────────────────────────────────────────
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# ─────────────────────────────────────────────────────────────────────────────
# Disable Spring banner in production (clutters logs)
# ─────────────────────────────────────────────────────────────────────────────
spring.main.banner-mode=off

# ─────────────────────────────────────────────────────────────────────────────
# Actuator: only expose health (not env, beans, metrics — security risk)
# ─────────────────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ─────────────────────────────────────────────────────────────────────────────
# MongoDB (Production - Atlas)
# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED: Set MONGODB_URI environment variable in production
# Auto-create indexes from @CompoundIndex annotations (idempotent)
spring.data.mongodb.auto-index-creation=true

# ─────────────────────────────────────────────────────────────────────────────
# Thymeleaf (enable template caching in production)
# ─────────────────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=true

# ─────────────────────────────────────────────────────────────────────────────
# CORS (Production frontend origins only)
# ─────────────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=https://cointrack-finance.vercel.app,https://cointrack-15gt.onrender.com

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY REMINDERS (Production Checklist)
# ─────────────────────────────────────────────────────────────────────────────
# ✓ Never log tokens, passwords, or API secrets
# ✓ Ensure HTTPS is enforced
# ✓ Set strong JWT_SECRET (min 256 bits)
# ✓ Set strong ENCRYPTION_SECRET_KEY (32 chars)
# ✓ Configure rate limiting for API endpoints
# ✓ Enable CORS only for production frontend domain
# ✓ SecurityConfig should include:
#     .headers(h -> h.frameOptions(fo -> fo.deny())
#                   .xssProtection(xss -> {})
#                   .contentSecurityPolicy(csp -> csp.policyDirectives("default-src 'self'")))
