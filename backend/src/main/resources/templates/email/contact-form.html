<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Contact Form Submission</title>
</head>
<body style="margin:0; padding:0; background:#F8FAFC; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;">

  <div style="display:none; max-height:0; overflow:hidden; color:#F8FAFC;">
    New contact form submission received.
  </div>

  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#F8FAFC; padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; width:100%;">

          <!-- Flat dark header for internal email -->
          <tr>
            <td style="background:#1e1b4b; padding:24px 40px; border-radius:8px 8px 0 0;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td>
                    <img th:src="${logoUrl}" width="32" height="32" alt="CoinTrack" style="vertical-align:middle; border-radius:6px;"/>
                    <span style="color:#FFFFFF; font-size:18px; font-weight:700; vertical-align:middle; margin-left:10px; letter-spacing:-0.3px;">CoinTrack</span>
                    <br/>
                    <span style="font-size:12px; color:#93C5FD; margin-left:42px;">Contact Form Submission</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="background:#FFFFFF; padding:48px 40px 40px 40px; border-left:1px solid #E2E8F0; border-right:1px solid #E2E8F0;">

              <h1 style="margin:0 0 24px 0; font-size:28px; font-weight:700; color:#0F172A; line-height:1.3;">New Contact Form Submission</h1>

              <!-- Sender details -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 24px 0;">
                <tr>
                  <td style="padding:10px 0; border-bottom:1px solid #F1F5F9; width:100px;">
                    <span style="font-size:13px; color:#94A3B8;">From</span>
                  </td>
                  <td style="padding:10px 0; border-bottom:1px solid #F1F5F9;">
                    <span th:text="${name}" style="font-size:13px; color:#0F172A; font-weight:500;">John Doe</span>
                  </td>
                </tr>
                <tr>
                  <td style="padding:10px 0; border-bottom:1px solid #F1F5F9;">
                    <span style="font-size:13px; color:#94A3B8;">Email</span>
                  </td>
                  <td style="padding:10px 0; border-bottom:1px solid #F1F5F9;">
                    <a th:href="'mailto:' + ${email}" th:text="${email}" style="font-size:13px; color:#9333ea; text-decoration:none; font-weight:500;">user@example.com</a>
                  </td>
                </tr>
              </table>

              <!-- Divider -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td style="border-top:1px solid #E2E8F0; height:1px; line-height:1px;">&nbsp;</td></tr></table>

              <!-- Message label -->
              <p style="margin:24px 0 12px 0; font-size:13px; color:#94A3B8; text-transform:uppercase; letter-spacing:0.08em; font-weight:400;">Message</p>

              <!-- Message content -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="background:#F8FAFC; padding:20px; border-radius:8px; border:1px solid #E2E8F0;">
                    <p th:text="${message}" style="margin:0; font-size:14px; color:#0F172A; line-height:1.7; white-space:pre-wrap;">Message content here...</p>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <tr>
            <td style="background:#F1F5F9; padding:24px 40px; border:1px solid #E2E8F0; border-top:none; border-radius:0 0 8px 8px;">
              <p style="margin:0; font-size:12px; color:#94A3B8; line-height:1.6;">
                Reply directly to this email or write to <a th:href="'mailto:' + ${email}" th:text="${email}" style="color:#7c3aed; text-decoration:none;">user@example.com</a>
              </p>
              <p style="margin:8px 0 0; font-size:11px; color:#CBD5E1;">&copy; <span th:text="${year}">2026</span> CoinTrack. Internal notification.</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
